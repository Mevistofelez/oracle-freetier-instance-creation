name: Create Oracle Free Tier Instance

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install oci python-dotenv requests paramiko

      - name: Prepare OCI files
        shell: bash
        run: |
          sudo mkdir -p /home/ubuntu/oracle-freetier-instance-creation
          sudo chown -R "$(id -un)":"$(id -gn)" /home/ubuntu/oracle-freetier-instance-creation

          cat > /home/ubuntu/oracle-freetier-instance-creation/oci_config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_ID }}
          fingerprint=${{ secrets.OCI_KEY_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_ID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/ubuntu/oracle-freetier-instance-creation/oci_api_key.pem
          EOF

          cat > /home/ubuntu/oracle-freetier-instance-creation/oci_api_key.pem <<EOF
          ${{ secrets.OCI_PRIVATE_KEY }}
          EOF

          chmod 600 /home/ubuntu/oracle-freetier-instance-creation/oci_api_key.pem
          chmod 644 /home/ubuntu/oracle-freetier-instance-creation/oci_config

          echo "=== OCI FILES ==="
          ls -la /home/ubuntu/oracle-freetier-instance-creation
          echo "================="

      - name: Debug OCI env
        shell: bash
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          echo "=== DEBUG OCI ENV ==="
          [ -n "$OCI_USER_ID" ] && echo "OCI_USER_ID OK" || echo "OCI_USER_ID EMPTY"
          [ -n "$OCI_TENANCY_ID" ] && echo "OCI_TENANCY_ID OK" || echo "OCI_TENANCY_ID EMPTY"
          [ -n "$OCI_REGION" ] && echo "OCI_REGION OK" || echo "OCI_REGION EMPTY"
          [ -n "$OCI_COMPARTMENT_ID" ] && echo "OCI_COMPARTMENT_ID OK" || echo "OCI_COMPARTMENT_ID EMPTY"
          [ -n "$OCI_SUBNET_ID" ] && echo "OCI_SUBNET_ID OK" || echo "OCI_SUBNET_ID EMPTY"
          [ -n "$OCI_IMAGE_ID" ] && echo "OCI_IMAGE_ID OK" || echo "OCI_IMAGE_ID EMPTY"
          [ -n "$OCI_KEY_FINGERPRINT" ] && echo "OCI_KEY_FINGERPRINT OK" || echo "OCI_KEY_FINGERPRINT EMPTY"
          [ -n "$OCI_PRIVATE_KEY" ] && echo "OCI_PRIVATE_KEY OK" || echo "OCI_PRIVATE_KEY EMPTY"
          echo "====================="

      - name: Create instance
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: python -u main.py

      - name: Upload SSH keys and instance info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oci-instance-credentials
          path: |
            id_rsa.pub
            id_rsa_private
            INSTANCE_CREATED
          retention-days: 30
